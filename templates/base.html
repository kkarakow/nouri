<html lang="en">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: '#1B4D3E',
            mint:   '#00A878',
            gold:   '#C9A84C',
            ink:    '#0D1117',
            mist:   '#F4F6F2',
            warm:   '#F9F7F3',
          },
          fontFamily: {
            serif: ['Cormorant Garamond', 'Georgia', 'serif'],
            sans:  ['DM Sans', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: #F9F7F3; min-height: 100vh; }
    h1, h2, h3, .font-serif { font-family: 'Cormorant Garamond', Georgia, serif; }

    /* Animated gradient blobs */
    .blob-container { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
    .blob {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 { width: 500px; height: 500px; background: #1B4D3E; top: -150px; left: -100px; animation-duration: 14s; }
    .blob-2 { width: 400px; height: 400px; background: #00A878; bottom: -120px; right: -80px; animation-duration: 10s; animation-delay: -4s; }
    .blob-3 { width: 300px; height: 300px; background: #C9A84C; top: 40%; left: 50%; transform: translateX(-50%); animation-duration: 16s; animation-delay: -8s; }
    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(30px, -20px) scale(1.05); }
      100% { transform: translate(-20px, 30px) scale(0.95); }
    }

    /* Glass card */
    .glass {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(27, 77, 62, 0.08);
    }

    /* Inputs */
    .nouri-input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid rgba(27, 77, 62, 0.15);
      border-radius: 10px;
      background: rgba(255,255,255,0.8);
      font-family: 'DM Sans', sans-serif; font-size: 15px; color: #0D1117;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .nouri-input:focus {
      border-color: #00A878;
      box-shadow: 0 0 0 3px rgba(0, 168, 120, 0.12);
    }
    .nouri-label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: #1B4D3E; margin-bottom: 6px;
    }

    /* Buttons */
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 14px 32px; border-radius: 100px;
      background: #1B4D3E; color: white;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
      text-decoration: none; border: none; cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(27, 77, 62, 0.25);
    }
    .btn-primary:hover { background: #153d31; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(27, 77, 62, 0.3); }
    .btn-primary:active { transform: translateY(0); }

    .btn-mint {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 14px 32px; border-radius: 100px;
      background: #00A878; color: white;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
      text-decoration: none; border: none; cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(0, 168, 120, 0.3);
    }
    .btn-mint:hover { background: #009068; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0, 168, 120, 0.35); }

    .btn-ghost {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 12px 28px; border-radius: 100px;
      background: transparent; color: #1B4D3E;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
      text-decoration: none; border: 1.5px solid rgba(27, 77, 62, 0.3); cursor: pointer;
      transition: all 0.2s;
    }
    .btn-ghost:hover { border-color: #1B4D3E; background: rgba(27, 77, 62, 0.05); }

    /* Checkbox card */
    .check-card input[type="checkbox"] { display: none; }
    .check-card label {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-radius: 10px;
      border: 1.5px solid rgba(27, 77, 62, 0.15);
      background: rgba(255,255,255,0.7); cursor: pointer;
      font-size: 14px; color: #0D1117;
      transition: all 0.18s;
    }
    .check-card label:hover { border-color: #00A878; background: rgba(0,168,120,0.06); }
    .check-card input[type="checkbox"]:checked + label {
      border-color: #00A878; background: rgba(0,168,120,0.1); color: #1B4D3E; font-weight: 500;
    }
    .check-icon {
      width: 18px; height: 18px; border-radius: 4px;
      border: 1.5px solid rgba(27,77,62,0.3); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
    }
    .check-card input[type="checkbox"]:checked + label .check-icon {
      background: #00A878; border-color: #00A878;
    }
    .check-card input[type="checkbox"]:checked + label .check-icon::after {
      content: '✓'; color: white; font-size: 11px; font-weight: 700;
    }

    /* Radio card */
    .radio-card input[type="radio"] { display: none; }
    .radio-card label {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; border-radius: 12px;
      border: 1.5px solid rgba(27, 77, 62, 0.15);
      background: rgba(255,255,255,0.7); cursor: pointer;
      transition: all 0.18s;
    }
    .radio-card label:hover { border-color: #00A878; background: rgba(0,168,120,0.06); }
    .radio-card input[type="radio"]:checked + label {
      border-color: #00A878; background: rgba(0,168,120,0.1); color: #1B4D3E;
    }
    .radio-dot {
      width: 18px; height: 18px; border-radius: 50%;
      border: 1.5px solid rgba(27,77,62,0.3); flex-shrink: 0;
      transition: all 0.18s;
    }
    .radio-card input[type="radio"]:checked + label .radio-dot {
      background: #00A878; border-color: #00A878;
      box-shadow: inset 0 0 0 3px white;
    }

    /* Progress bar */
    .progress-track { background: rgba(27,77,62,0.1); border-radius: 100px; height: 4px; }
    .progress-fill { background: linear-gradient(90deg, #1B4D3E, #00A878); border-radius: 100px; height: 4px; transition: width 0.4s ease; }

    /* Nav */
    nav { position: relative; z-index: 10; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Navigation -->

      <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
        <path d="M8 28V10C8 10 8 6 13 6C18 6 18 10 18 10V18C18 18 18 22 23 22C28 22 28 18 28 18V8"
              stroke="#1B4D3E" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M18 14C18 14 20 18 23 18" stroke="#00A878" stroke-width="2" stroke-linecap="round"/>
        <circle cx="28" cy="28" r="3" fill="#C9A84C"/>
      </svg>
      <span style="font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; color:#1B4D3E; letter-spacing:0.02em;">Nouri</span>
    </a>
    <div class="flex items-center gap-4">
      <button onclick="toggleLang()" id="lang-toggle"
        style="font-size:12px; font-weight:500; letter-spacing:0.06em; color:#1B4D3E;
               border:1.5px solid rgba(27,77,62,0.25); border-radius:100px; padding:5px 14px;
               background:rgba(255,255,255,0.6); cursor:pointer; backdrop-filter:blur(8px);">
        EN / PL
      </button>
      {% if user.is_authenticated %}
        <a href="/accounts/logout/" class="btn-ghost" style="padding:8px 20px; font-size:13px;" data-i18n="nav.signout">Sign Out</a>
      {% else %}
        <a href="/accounts/login/" class="btn-ghost" style="padding:8px 20px; font-size:13px;" data-i18n="nav.signin">Sign In</a>
      {% endif %}
    </div>
  </nav>

  <!-- Main content -->
  <main style="position: relative; z-index: 1;">
    {% block content %}{% endblock %}
  </main>

    let currentLang = localStorage.getItem('nouri_lang') || 'en';

    function applyLang(lang) {
      const t = TRANSLATIONS[lang] || TRANSLATIONS.en;
      // Swap innerHTML for all data-i18n elements
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const v = t[el.dataset.i18n];
        if (v !== undefined) el.innerHTML = v;
      });
      // Swap placeholder for all data-i18n-placeholder elements
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const v = t[el.dataset.i18nPlaceholder];
        if (v !== undefined) el.placeholder = v;
      });
      const btn = document.getElementById('lang-toggle');
      if (btn) btn.textContent = lang === 'en' ? 'EN / PL' : 'PL / EN';
      document.documentElement.lang = lang;
    }

    function toggleLang() {
      currentLang = currentLang === 'en' ? 'pl' : 'en';
      localStorage.setItem('nouri_lang', currentLang);
      applyLang(currentLang);
    }

    document.addEventListener('DOMContentLoaded', () => applyLang(currentLang));
  </script>
